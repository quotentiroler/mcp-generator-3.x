# Integration tests: regenerate example MCP servers and run their test suites
# For unit tests of the generator itself, see tests.yml
name: Test Examples

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:  # Allow manual trigger

# Cancel in-progress runs when a new run is triggered on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Discover all examples dynamically
  discover:
    name: Discover Examples
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.discover.outputs.examples }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Discover example directories
        id: discover
        run: |
          # Find all directories in examples/ that contain openapi.json
          examples=$(find examples -mindepth 1 -maxdepth 1 -type d -exec test -f {}/openapi.json \; -print | \
            sed 's|examples/||' | \
            jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "examples=$examples" >> $GITHUB_OUTPUT
          echo "📦 Discovered examples: $examples"

  # Test each example in parallel
  test-example:
    name: Test ${{ matrix.example }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Continue testing other examples even if one fails
      matrix:
        example: ${{ fromJson(needs.discover.outputs.examples) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      - name: Test ${{ matrix.example }}
        run: |
          cd examples/${{ matrix.example }}

          echo "=========================================="
          echo "Testing: ${{ matrix.example }}"
          echo "=========================================="

          # Generate MCP server
          uv run generate-mcp --enable-storage --enable-caching --enable-resources

          # Verify FastMCP 3.1 features in generated code
          echo "🔍 Verifying FastMCP 3.1 features..."
          
          # Check fastmcp.json has features section
          if grep -q '"features"' generated_mcp/fastmcp.json; then
            echo "  ✅ fastmcp.json has features section"
          else
            echo "  ❌ fastmcp.json missing features section"
            exit 1
          fi
          
          # Check for transforms support
          if grep -q 'SearchTools\|CodeMode' generated_mcp/*_mcp_generated.py; then
            echo "  ✅ Transforms support present (SearchTools/CodeMode)"
          fi
          
          # Check for middleware
          if grep -q 'ResponseLimitingMiddleware\|PingMiddleware' generated_mcp/*_mcp_generated.py; then
            echo "  ✅ FastMCP 3.1 middleware present"
          fi
          
          # Check for OpenTelemetry support
          if grep -q 'opentelemetry\|TracerProvider' generated_mcp/*_mcp_generated.py; then
            echo "  ✅ OpenTelemetry support present"
          fi

          # Run tests
          uv run python test/run_tests.py

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.example }}
          path: |
            examples/${{ matrix.example }}/generated_mcp/
            examples/${{ matrix.example }}/test/
          retention-days: 7
