# Promote a pre-release to stable version on staging
# Strips -alpha/-beta/-rc suffix, updates version files, pushes directly to staging
# Usage: manually trigger from Actions tab, optionally override the version
name: Promote to Stable

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override stable version (leave empty to auto-strip pre-release suffix)"
        required: false
        type: string

jobs:
  promote:
    name: Promote to Stable
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write  # For dispatching auto-pr-to-main

    steps:
    - name: Checkout staging
      uses: actions/checkout@v4
      with:
        ref: staging
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Get current version
      id: current
      run: |
        python3 << 'EOF' > version.txt
        import re
        with open('pyproject.toml') as f:
            content = f.read()
        match = re.search(r'^version\s*=\s*["\']([^"\']+)["\']', content, re.MULTILINE)
        print(match.group(1))
        EOF
        VERSION=$(cat version.txt)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Current version: $VERSION"

    - name: Calculate stable version
      id: stable
      run: |
        CURRENT="${{ steps.current.outputs.version }}"
        OVERRIDE="${{ inputs.version_override }}"

        if [ -n "$OVERRIDE" ]; then
          STABLE="$OVERRIDE"
          echo "📌 Using override version: $STABLE"
        else
          STABLE=$(echo "$CURRENT" | sed -E 's/[-+].*//')
          echo "📌 Auto-stripped: $CURRENT → $STABLE"
        fi

        if ! [[ "$STABLE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "❌ Invalid stable version: $STABLE (expected MAJOR.MINOR.PATCH)"
          exit 1
        fi

        if [ "$CURRENT" = "$STABLE" ]; then
          echo "❌ Current version $CURRENT is already stable — nothing to promote"
          exit 1
        fi

        echo "version=$STABLE" >> $GITHUB_OUTPUT
        echo "✅ Will promote: $CURRENT → $STABLE"

    - name: Update pyproject.toml
      run: |
        STABLE="${{ steps.stable.outputs.version }}"
        python3 << EOF
        import re

        with open('pyproject.toml', 'r') as f:
            content = f.read()

        content = re.sub(
            r'^(version\s*=\s*["\'])[^"\']+(["\'])',
            rf'\g<1>${STABLE}\2',
            content,
            flags=re.MULTILINE,
        )

        with open('pyproject.toml', 'w') as f:
            f.write(content)

        print(f"✅ pyproject.toml updated to ${STABLE}")
        EOF

    - name: Update CHANGELOG.md
      run: |
        CURRENT="${{ steps.current.outputs.version }}"
        STABLE="${{ steps.stable.outputs.version }}"
        DATE=$(date +%Y-%m-%d)

        python3 << EOF
        import re

        with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
            content = f.read()

        current_base = "${CURRENT}".split('+')[0]
        pattern = rf'## \[{re.escape(current_base)}(?:\+[a-f0-9]+)?\](\s*-\s*)\d{{4}}-\d{{2}}-\d{{2}}'
        replacement = f'## [${STABLE}]\\1${DATE}'

        new_content, count = re.subn(pattern, replacement, content)
        if count > 0:
            with open('CHANGELOG.md', 'w', encoding='utf-8') as f:
                f.write(new_content)
            print(f"✅ CHANGELOG.md updated: {current_base} → ${STABLE} ({count} replacement(s))")
        else:
            print(f"⚠️  Could not find [{current_base}] in CHANGELOG.md — manual update may be needed")
        EOF

    - name: Update SECURITY.md
      run: |
        CURRENT="${{ steps.current.outputs.version }}"
        STABLE="${{ steps.stable.outputs.version }}"

        python3 << EOF
        import re

        with open('SECURITY.md', 'r', encoding='utf-8') as f:
            content = f.read()

        current_base = "${CURRENT}".split('+')[0]
        pattern = rf'\|\s*{re.escape(current_base)}(?:\+[a-f0-9]+)?\s*\|'
        replacement = f'| ${STABLE}   |'

        new_content, count = re.subn(pattern, replacement, content)
        if count > 0:
            with open('SECURITY.md', 'w', encoding='utf-8') as f:
                f.write(new_content)
            print(f"✅ SECURITY.md updated ({count} replacement(s))")
        else:
            print(f"⚠️  Could not find {current_base} in SECURITY.md — skipping")
        EOF

    - name: Install uv and regenerate lock
      run: |
        pip install uv
        uv lock
        echo "✅ uv.lock regenerated"

    - name: Commit and push to staging
      run: |
        CURRENT="${{ steps.current.outputs.version }}"
        STABLE="${{ steps.stable.outputs.version }}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add pyproject.toml uv.lock CHANGELOG.md SECURITY.md
        git commit -m "release: promote $CURRENT → $STABLE [automated]"
        git push origin staging

        echo "✅ Pushed to staging"

    - name: Trigger Auto PR to Main
      uses: actions/github-script@v7
      with:
        script: |
          try {
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-pr-to-main.yml',
              ref: 'staging'
            });
            console.log('✅ Dispatched auto-pr-to-main workflow');
          } catch (error) {
            console.log(`⚠️  Could not dispatch auto-pr-to-main: ${error.message}`);
          }

    - name: Summary
      if: always()
      run: |
        echo "=========================================="
        echo "PROMOTE TO STABLE SUMMARY"
        echo "=========================================="
        echo "From: ${{ steps.current.outputs.version }}"
        echo "To:   ${{ steps.stable.outputs.version }}"
        echo "Branch: staging"
        echo "=========================================="
