# Promote a pre-release to stable release
# Strips -alpha/-beta/-rc suffix, updates files, creates stable GitHub release
# Usage: manually trigger from Actions tab, optionally override the version
name: Promote to Stable Release

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: "Override stable version (leave empty to auto-strip pre-release suffix)"
        required: false
        type: string
      skip_pypi:
        description: "Skip PyPI publish (release event still fires, but you can cancel it)"
        required: false
        type: boolean
        default: false

jobs:
  promote:
    name: Promote to Stable
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout main branch
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Get current version
      id: current
      run: |
        python3 << 'EOF' > version.txt
        import re
        with open('pyproject.toml') as f:
            content = f.read()
        match = re.search(r'^version\s*=\s*["\']([^"\']+)["\']', content, re.MULTILINE)
        print(match.group(1))
        EOF
        VERSION=$(cat version.txt)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Current version: $VERSION"

    - name: Calculate stable version
      id: stable
      run: |
        CURRENT="${{ steps.current.outputs.version }}"
        OVERRIDE="${{ inputs.version_override }}"

        if [ -n "$OVERRIDE" ]; then
          STABLE="$OVERRIDE"
          echo "📌 Using override version: $STABLE"
        else
          # Strip pre-release suffix and build metadata
          # 3.2.2-alpha+abc123 → 3.2.2
          # 3.2.2-beta → 3.2.2
          # 3.2.2-rc.1+def456 → 3.2.2
          STABLE=$(echo "$CURRENT" | sed -E 's/[-+].*//')
          echo "📌 Auto-stripped: $CURRENT → $STABLE"
        fi

        # Validate it looks like a stable version
        if ! [[ "$STABLE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "❌ Invalid stable version: $STABLE (expected MAJOR.MINOR.PATCH)"
          exit 1
        fi

        # Check the current version is actually a pre-release
        if [ "$CURRENT" = "$STABLE" ]; then
          echo "❌ Current version $CURRENT is already stable — nothing to promote"
          exit 1
        fi

        echo "version=$STABLE" >> $GITHUB_OUTPUT
        echo "✅ Will promote: $CURRENT → $STABLE"

    - name: Check release doesn't already exist
      run: |
        STABLE="${{ steps.stable.outputs.version }}"
        if gh release view "v$STABLE" --repo ${{ github.repository }} > /dev/null 2>&1; then
          echo "❌ Release v$STABLE already exists!"
          exit 1
        fi
        echo "✅ No existing release for v$STABLE"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update pyproject.toml
      run: |
        STABLE="${{ steps.stable.outputs.version }}"
        python3 << EOF
        import re

        with open('pyproject.toml', 'r') as f:
            content = f.read()

        content = re.sub(
            r'^(version\s*=\s*["\'])[^"\']+(["\'])',
            rf'\g<1>${STABLE}\2',
            content,
            flags=re.MULTILINE,
        )

        with open('pyproject.toml', 'w') as f:
            f.write(content)

        print(f"✅ pyproject.toml updated to ${STABLE}")
        EOF

    - name: Update CHANGELOG.md
      run: |
        CURRENT="${{ steps.current.outputs.version }}"
        STABLE="${{ steps.stable.outputs.version }}"
        DATE=$(date +%Y-%m-%d)

        python3 << EOF
        import re

        with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
            content = f.read()

        # Replace the pre-release version header with stable
        # Match: ## [3.2.2-alpha+abc123] - 2026-04-22  or  ## [3.2.2-alpha] - ...
        current_base = "${CURRENT}".split('+')[0]
        pattern = rf'## \[{re.escape(current_base)}(?:\+[a-f0-9]+)?\](\s*-\s*)\d{{4}}-\d{{2}}-\d{{2}}'
        replacement = f'## [${STABLE}]\\1${DATE}'

        new_content, count = re.subn(pattern, replacement, content)
        if count > 0:
            with open('CHANGELOG.md', 'w', encoding='utf-8') as f:
                f.write(new_content)
            print(f"✅ CHANGELOG.md updated: {current_base} → ${STABLE} ({count} replacement(s))")
        else:
            print(f"⚠️  Could not find [{current_base}] in CHANGELOG.md — manual update may be needed")
        EOF

    - name: Update SECURITY.md
      run: |
        CURRENT="${{ steps.current.outputs.version }}"
        STABLE="${{ steps.stable.outputs.version }}"

        python3 << EOF
        import re

        with open('SECURITY.md', 'r', encoding='utf-8') as f:
            content = f.read()

        current_base = "${CURRENT}".split('+')[0]
        # Match version in the support table, with optional +hash
        pattern = rf'\|\s*{re.escape(current_base)}(?:\+[a-f0-9]+)?\s*\|'
        replacement = f'| ${STABLE}   |'

        new_content, count = re.subn(pattern, replacement, content)
        if count > 0:
            with open('SECURITY.md', 'w', encoding='utf-8') as f:
                f.write(new_content)
            print(f"✅ SECURITY.md updated ({count} replacement(s))")
        else:
            print(f"⚠️  Could not find {current_base} in SECURITY.md — skipping")
        EOF

    - name: Install uv and regenerate lock
      run: |
        pip install uv
        uv lock
        echo "✅ uv.lock regenerated"

    - name: Commit and push
      run: |
        CURRENT="${{ steps.current.outputs.version }}"
        STABLE="${{ steps.stable.outputs.version }}"

        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add pyproject.toml uv.lock CHANGELOG.md SECURITY.md
        git commit -m "release: promote $CURRENT → $STABLE [automated]"
        git push origin main

        echo "✅ Committed version bump to main"

    - name: Extract release notes
      id: notes
      run: |
        STABLE="${{ steps.stable.outputs.version }}"

        python3 << 'EOF'
        import re

        with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
            content = f.read()

        version = "${{ steps.stable.outputs.version }}"
        pattern = rf'## \[{re.escape(version)}[^\]]*\][^\n]*\n(.*?)(?=\n## \[|$)'
        match = re.search(pattern, content, re.DOTALL)

        if match:
            notes = match.group(1).strip()
            with open('release_notes.txt', 'w', encoding='utf-8') as f:
                f.write(notes)
            print(f"✅ Extracted release notes for {version}")
        else:
            with open('release_notes.txt', 'w', encoding='utf-8') as f:
                f.write(f"Stable release {version}")
            print(f"⚠️  No changelog section found for {version}")
        EOF

    - name: Create stable GitHub release
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const version = '${{ steps.stable.outputs.version }}';
          const tagName = `v${version}`;
          const releaseNotes = fs.readFileSync('release_notes.txt', 'utf8');

          const release = await github.rest.repos.createRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            tag_name: tagName,
            name: tagName,
            body: releaseNotes,
            draft: false,
            prerelease: false,
            target_commitish: 'main',
            make_latest: 'true'
          });

          console.log(`✅ Stable release created: ${release.data.html_url}`);
          core.summary.addHeading(`🎉 Stable Release ${tagName}`);
          core.summary.addLink('View Release', release.data.html_url);
          await core.summary.write();

    - name: Sync stable version to staging and develop
      run: |
        STABLE="${{ steps.stable.outputs.version }}"

        # Sync to staging
        git fetch origin staging
        git checkout staging
        git checkout main -- pyproject.toml uv.lock
        if ! git diff --quiet --cached pyproject.toml uv.lock 2>/dev/null; then
          git add pyproject.toml uv.lock
          git commit -m "chore: sync stable version $STABLE from main [automated]"
          git push origin staging
          echo "✅ Synced to staging"
        else
          echo "ℹ️  Staging already up to date"
        fi

        # Sync to develop
        git fetch origin develop
        git checkout develop
        git checkout main -- pyproject.toml uv.lock
        if ! git diff --quiet --cached pyproject.toml uv.lock 2>/dev/null; then
          git add pyproject.toml uv.lock
          git commit -m "chore: sync stable version $STABLE from main [automated]"
          git push origin develop
          echo "✅ Synced to develop"
        else
          echo "ℹ️  Develop already up to date"
        fi

    - name: Summary
      if: always()
      run: |
        echo "=========================================="
        echo "PROMOTE TO STABLE SUMMARY"
        echo "=========================================="
        echo "From: ${{ steps.current.outputs.version }}"
        echo "To:   ${{ steps.stable.outputs.version }}"
        echo "Tag:  v${{ steps.stable.outputs.version }}"
        echo "=========================================="
        echo ""
        echo "Next steps:"
        echo "  - PyPI publish will trigger automatically (release: published event)"
        echo "  - Approve the 'pypi' environment if required"
        echo "=========================================="
