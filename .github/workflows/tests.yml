# Unit tests, linting, type checking, and end-to-end tests for the MCP generator
# For integration tests of individual examples, see test-examples.yml
name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Cancel in-progress runs when a new run is triggered on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Install Node.js (for OpenAPI Generator)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Cache OpenAPI Generator CLI
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-openapi-generator
        restore-keys: |
          ${{ runner.os }}-npm-

    - name: Install OpenAPI Generator CLI
      run: npm install -g @openapitools/openapi-generator-cli

    - name: Install dependencies
      run: uv sync --group dev

    - name: Run linting (Ruff)
      run: uv run ruff check .

    - name: Run formatting check (Ruff)
      run: uv run ruff format --check .

    - name: Run type checking (mypy)
      run: uv run mypy mcp_generator/
      continue-on-error: true  # Don't fail on type errors initially

    - name: Run unit tests
      run: uv run pytest test/ -v --tb=short --ignore=test/generated

    - name: Run unit tests with coverage
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      run: uv run pytest test/ --cov=mcp_generator --cov-report=xml --cov-report=term-missing --ignore=test/generated

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      with:
        file: ./coverage.xml
        flags: unittests
        name: mcp-generator-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    name: E2E - Generate, Start & Test Server
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Install Node.js (for OpenAPI Generator)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install OpenAPI Generator CLI
      run: npm install -g @openapitools/openapi-generator-cli

    - name: Install dependencies
      run: uv sync --group dev

    - name: Generate MCP server from petstore spec
      run: |
        cd examples/petstore-openapi-3-0-4
        uv run generate-mcp --enable-storage --enable-caching --enable-resources
        echo "✅ MCP server generated"
        ls -la generated_mcp/
        echo ""
        echo "📝 Generated tests:"
        ls -la test/generated/ || echo "⚠️ No generated tests found"

    - name: Install generated server dependencies
      run: |
        cd examples/petstore-openapi-3-0-4/generated_mcp
        uv sync
        echo "✅ Server dependencies installed"

    - name: Start MCP server
      run: |
        cd examples/petstore-openapi-3-0-4/generated_mcp
        uv run python swagger_petstore_openapi_mcp_generated.py --transport http --port 8000 &
        SERVER_PID=$!
        echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
        echo "⏳ Waiting for server to start (PID: $SERVER_PID)..."

        # Wait up to 30 seconds for server to be ready
        for i in $(seq 1 30); do
          if curl -sf http://localhost:8000/mcp > /dev/null 2>&1 || \
             curl -sf -X POST http://localhost:8000/mcp \
               -H "Content-Type: application/json" \
               -d '{"jsonrpc":"2.0","id":"ping","method":"ping"}' > /dev/null 2>&1; then
            echo "✅ Server ready after ${i}s"
            break
          fi
          if ! kill -0 $SERVER_PID 2>/dev/null; then
            echo "❌ Server process died"
            exit 1
          fi
          sleep 1
        done

        # Final check
        if ! kill -0 $SERVER_PID 2>/dev/null; then
          echo "❌ Server is not running"
          exit 1
        fi
        echo "✅ Server is running on http://localhost:8000/mcp"

    - name: Run e2e tests against live server
      env:
        MCP_SERVER_URL: http://localhost:8000/mcp
      run: |
        cd examples/petstore-openapi-3-0-4
        uv run pytest test/generated/ -v --tb=short -x \
          --ignore=test/generated/test_behavioral_generated.py \
          -rs

    - name: Stop MCP server
      if: always()
      run: |
        if [ -n "$SERVER_PID" ]; then
          kill $SERVER_PID 2>/dev/null || true
          wait $SERVER_PID 2>/dev/null || true
          echo "✅ Server stopped"
        fi

    - name: Upload test artifacts on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-results
        path: |
          examples/petstore-openapi-3-0-4/generated_mcp/
          examples/petstore-openapi-3-0-4/test/generated/
        retention-days: 7
