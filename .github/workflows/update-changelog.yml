# Automatically update CHANGELOG.md when PR is merged to staging
# Summarizes commit messages from the PR and adds them to the changelog
name: Update Changelog

on:
  pull_request:
    types: [closed]
    branches:
      - staging

jobs:
  update-changelog:
    # Only run if PR was actually merged (not just closed)
    # Skip if the PR title contains 'release:' to avoid conflicts with promote workflow
    if: |
      github.event.pull_request.merged == true &&
      !startsWith(github.event.pull_request.title, 'Release:')
    name: Generate and Update Changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write  # For committing changes
      actions: write   # For dispatching auto-pr-to-main

    steps:
    - name: Checkout staging branch
      uses: actions/checkout@v4
      with:
        ref: staging
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "pyproject.toml"

    - name: Install OpenAI package
      run: |
        uv pip install --system openai

    - name: Get version from pyproject.toml
      id: get_version
      run: |
        python3 << 'EOF' > version.txt
        import re
        with open('pyproject.toml') as f:
            content = f.read()
        match = re.search(r'^version\s*=\s*["\']([^"\']+)["\']', content, re.MULTILINE)
        print(match.group(1))
        EOF
        VERSION=$(cat version.txt)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Version: $VERSION"

    - name: Find last release tag
      id: last_release
      run: |
        # Get the last stable release tag (no -alpha, -beta, -rc suffix)
        LAST_STABLE=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
        
        # Get the last release tag of any kind
        LAST_ANY=$(git tag -l 'v*' --sort=-v:refname | head -1)
        
        if [ -n "$LAST_STABLE" ]; then
          echo "last_tag=$LAST_STABLE" >> $GITHUB_OUTPUT
          echo "📌 Last stable release: $LAST_STABLE"
        elif [ -n "$LAST_ANY" ]; then
          echo "last_tag=$LAST_ANY" >> $GITHUB_OUTPUT
          echo "📌 Last release (pre-release): $LAST_ANY"
        else
          # No tags found, use initial commit
          FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD)
          echo "last_tag=$FIRST_COMMIT" >> $GITHUB_OUTPUT
          echo "📌 No releases found, using first commit"
        fi

    - name: Get all commits since last release
      id: get_commits
      run: |
        LAST_TAG="${{ steps.last_release.outputs.last_tag }}"
        echo "📊 Collecting commits from $LAST_TAG to HEAD"
        
        # Get all commits between last release and current staging
        git log $LAST_TAG..HEAD --pretty=format:"[%h] %an: %s" --no-merges > commit_messages.txt
        
        COMMIT_COUNT=$(wc -l < commit_messages.txt)
        echo "✅ Found $COMMIT_COUNT commits since $LAST_TAG"
        echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
        
        # Show first 10 for debugging
        echo "📝 Sample commits:"
        head -10 commit_messages.txt

    - name: Generate AI-powered changelog
      id: ai_summary
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_TITLE: ${{ github.event.pull_request.title }}
        PR_BODY: ${{ github.event.pull_request.body }}
        PR_URL: ${{ github.event.pull_request.html_url }}
      run: |
        python scripts/workflows/generate_changelog_ai.py
      continue-on-error: true

    - name: Fallback to manual categorization
      if: always()
      id: manual_categorize
      run: |
        # Check if AI summary already exists
        if [ -s changelog_entry.txt ]; then
          echo "✅ Using AI-generated changelog"
          exit 0
        fi

        echo "📝 Falling back to manual commit categorization"

        # Read commits from file generated by git log
        if [ ! -f commit_messages.txt ]; then
          echo "❌ No commit_messages.txt found"
          exit 1
        fi

        python3 scripts/workflows/categorize_commits.py

    - name: Update CHANGELOG.md
      id: update
      run: |
        python << 'EOF'
        import re
        from datetime import datetime

        # Read current changelog
        with open('CHANGELOG.md', 'r', encoding='utf-8') as f:
            content = f.read()

        # Read generated entry
        with open('changelog_entry.txt', 'r', encoding='utf-8') as f:
            new_entry = f.read()

        version = "${{ steps.get_version.outputs.version }}"
        today = datetime.now().strftime("%Y-%m-%d")

        # Find the unreleased section or the first version section
        # We want to add to the current version's section
        version_base = version.split('+')[0]  # Strip commit hash if present

        # Look for existing version header
        version_pattern = rf'## \[{re.escape(version_base)}[^\]]*\]'
        version_match = re.search(version_pattern, content)

        if version_match:
            # Find the position after the version header line
            header_end = content.find('\n', version_match.end())

            # Check if there's already content - if so, append to it
            next_section = re.search(r'\n## \[', content[header_end:])
            if next_section:
                insert_pos = header_end + next_section.start()
            else:
                insert_pos = len(content)

            # Insert the new entry
            new_content = content[:insert_pos] + '\n' + new_entry + '\n' + content[insert_pos:]

        else:
            # Version doesn't exist yet - create new section
            # Find where to insert (after "## Unreleased" or at the beginning)
            unreleased_match = re.search(r'## \[Unreleased\].*?\n', content)

            if unreleased_match:
                insert_pos = unreleased_match.end()
            else:
                # Insert after the first heading
                first_heading = re.search(r'^# .*?\n', content, re.MULTILINE)
                insert_pos = first_heading.end() if first_heading else 0

            new_section = f'\n## [{version_base}] - {today}\n{new_entry}\n'
            new_content = content[:insert_pos] + new_section + content[insert_pos:]

        # Write back
        with open('CHANGELOG.md', 'w', encoding='utf-8') as f:
            f.write(new_content)

        print(f"✅ Updated CHANGELOG.md for version {version_base}")
        EOF

    - name: Check if changes were made
      id: check_changes
      run: |
        if git diff --quiet CHANGELOG.md; then
          echo "changed=false" >> $GITHUB_OUTPUT
          echo "ℹ️  No changes to CHANGELOG.md"
        else
          echo "changed=true" >> $GITHUB_OUTPUT
          echo "✅ CHANGELOG.md was updated"
        fi

    - name: Commit changelog updates
      if: steps.check_changes.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        git add CHANGELOG.md
        git commit -m "docs: update CHANGELOG.md for PR #${{ github.event.pull_request.number }} [automated]"

        # Pull with rebase to handle concurrent updates
        git pull --rebase origin staging

        # Push changes (retry up to 3 times if there are conflicts)
        for i in {1..3}; do
          if git push origin staging; then
            echo "✅ Successfully pushed changelog update"
            break
          else
            echo "⚠️  Push failed, attempt $i/3. Pulling latest changes..."
            git pull --rebase origin staging
            if [ $i -eq 3 ]; then
              echo "❌ Failed to push after 3 attempts"
              exit 1
            fi
          fi
        done

    - name: Trigger Auto PR to Main
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          try {
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-pr-to-main.yml',
              ref: 'staging'
            });
            console.log('✅ Dispatched auto-pr-to-main workflow');
          } catch (error) {
            console.log(`⚠️  Could not dispatch auto-pr-to-main: ${error.message}`);
          }

    - name: Summary
      if: always()
      run: |
        echo "=========================================="
        echo "CHANGELOG UPDATE SUMMARY"
        echo "=========================================="
        echo "PR: #${{ github.event.pull_request.number }}"
        echo "Version: ${{ steps.get_version.outputs.version }}"
        if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
          echo "Status: ✅ CHANGELOG.md updated"
        else
          echo "Status: ℹ️  No changes needed"
        fi
        echo "=========================================="
